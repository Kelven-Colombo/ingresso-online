<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/_reset.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="js/app.js" defer></script>
    <title>e-Ticket</title>
  </head>

  <body>
    <header>
      <img class="logo" src="./assets/PNG/Logo e-tricket.png" alt="Logo" />
    </header>

    <main class="container">
      <div class="grafismo"></div>
      <h1>Compre seu <span>ingresso</span></h1>

      <form action="">
        <label class="input-group">
          Escolha o tipo
          <select name="tipo-ingresso" id="opcao-ingresso">
          </select>
        </label>
        <label class="input-group"
          >Qtd.
          <input
            type="number"
            id="input-qtd"
            placeholder="00"
            min="1"
            max="10"
          />
        </label>
        <button type="button" id="botao-comprar">Comprar</button>
      </form>

      <img class="hachuras" src="./assets/SVG/Hachuras.svg" alt="" />

      <section>
        <h2>Quantidade disponível</h2>

        <ul class="lista" id="lista-quantidades"></ul>

        <img src="./assets/Ingresso.svg" alt="" />
      </section>
    </main>
  </body>
</html>
